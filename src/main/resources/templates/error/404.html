<!DOCTYPE html>
<html th:replace="~{layout/main :: layout('404 Không tìm thấy', ~{::section})}"

<head><title>404</title></head>
<body>
<section>
    <div class="empty-state" style="padding:100px 20px;">
        <i class="fa-solid fa-circle-exclamation" style="color:var(--color-warning,#f59e0b);opacity:1;font-size:4rem;"></i>
        <h2 style="font-size:1.5rem;margin-bottom:8px;">404 — Không tìm thấy trang</h2>
        <p>Trang bạn tìm kiếm không tồn tại hoặc đã bị xóa.</p>
        <a th:href="@{/}" class="btn btn-primary" style="margin-top:16px;">

        </a>
    </div>
</section>
</body>
</html>
