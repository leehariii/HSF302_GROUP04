<!DOCTYPE html>
<html th:replace="~{layout/main :: layout('Mute User', ~{::section})}"
      lang="vi"
      xmlns:th="http://www.thymeleaf.org">
<head><title>Mute User</title></head>
<body>
<section>
    <div class="auth-page">
        <div class="auth-card">
            <h2 class="auth-title">
                <i class="fa-solid fa-microphone-slash"></i> Mute người dùng
            </h2>
            <p class="auth-subtitle">
                User: <strong th:text="${targetUser.username}"></strong>
            </p>

            <form th:action="@{/moderator/users/{id}/mute(id=${targetUser.id})}"
                  method="post" th:object="${muteRequest}" class="auth-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div class="form-group">
                    <label class="form-label">Loại hạn chế *</label>
                    <select th:field="*{restrictionType}" class="form-control">
                        <option value="MUTE_POST">Không cho đăng bài</option>
                        <option value="MUTE_COMMENT">Không cho bình luận</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Lý do</label>
                    <textarea th:field="*{reason}" class="form-control" rows="3"
                              placeholder="Lý do mute..." maxlength="255"></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">Hết hạn (để trống = vĩnh viễn)</label>
                    <input type="datetime-local" th:field="*{endAt}" class="form-control"/>
                </div>

                <div class="form-actions">
                    <a th:href="@{/admin/users/{id}(id=${targetUser.id})}" class="btn btn-ghost">Hủy</a>
                    <button type="submit" class="btn btn-warning">
                        <i class="fa-solid fa-microphone-slash"></i> Áp dụng mute
                    </button>
                </div>
            </form>
        </div>
    </div>
</section>
</body>
</html>
