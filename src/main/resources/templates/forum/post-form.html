<!DOCTYPE html>
<html th:replace="~{layout/main :: layout(${postId != null ? 'Sửa bài viết' : 'Đăng bài mới'}, ~{::section})}"
      lang="vi"
      xmlns:th="http://www.thymeleaf.org">
<head><title>Đăng bài</title></head>
<body>
<section>
    <div class="form-page">
        <div class="form-card">
            <h2 class="form-title">
                <i class="fa-solid fa-pen-to-square"></i>
                <span th:text="${postId != null ? 'Chỉnh sửa bài viết' : 'Đăng bài mới'}"></span>
            </h2>

            <div th:if="${errorMsg}" class="alert alert-error">
                <span th:text="${errorMsg}"></span>
            </div>

            <form th:action="${postId != null ? '/posts/' + postId + '/update' : '/posts/create'}"
                  method="post" th:object="${postRequest}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-error">
                    <span th:each="err : ${#fields.globalErrors()}" th:text="${err}"></span>
                </div>

                <!-- Topic -->
                <div class="form-group">
                    <label class="form-label">Chủ đề *</label>
                    <select th:field="*{topicId}" class="form-control"
                            th:classappend="${#fields.hasErrors('topicId')} ? ' is-invalid'">
                        <option value="">-- Chọn chủ đề --</option>
                        <option th:each="topic : ${topics}"
                                th:value="${topic.id}"
                                th:text="${topic.name}"></option>
                    </select>
                    <span th:if="${#fields.hasErrors('topicId')}"
                          th:errors="*{topicId}" class="form-error"></span>
                </div>

                <!-- Title -->
                <div class="form-group">
                    <label class="form-label">Tiêu đề *</label>
                    <input type="text" th:field="*{title}"
                           class="form-control"
                           th:classappend="${#fields.hasErrors('title')} ? ' is-invalid'"
                           placeholder="Nhập tiêu đề bài viết..." maxlength="255"/>
                    <span th:if="${#fields.hasErrors('title')}"
                          th:errors="*{title}" class="form-error"></span>
                </div>

                <!-- Content -->
                <div class="form-group">
                    <label class="form-label">Nội dung *</label>
                    <textarea th:field="*{content}"
                              class="form-control content-editor"
                              th:classappend="${#fields.hasErrors('content')} ? ' is-invalid'"
                              rows="12"
                              placeholder="Viết nội dung bài viết..."></textarea>
                    <span th:if="${#fields.hasErrors('content')}"
                          th:errors="*{content}" class="form-error"></span>
                </div>

                <!-- Image URL -->
                <div class="form-group">
                    <label class="form-label">URL Ảnh minh họa (Tùy chọn)</label>
                    <input type="text" th:field="*{imageUrl}"
                           class="form-control"
                           th:classappend="${#fields.hasErrors('imageUrl')} ? ' is-invalid'"
                           placeholder="https://..."/>
                    <span th:if="${#fields.hasErrors('imageUrl')}"
                          th:errors="*{imageUrl}" class="form-error"></span>
                </div>

                <div class="form-actions">
                    <a th:href="@{/}" class="btn btn-ghost">Hủy</a>
                    <button type="submit" class="btn btn-primary">
                        <i class="fa-solid fa-paper-plane"></i>
                        <span th:text="${postId != null ? 'Cập nhật bài' : 'Đăng bài'}"></span>
                    </button>
                </div>
            </form>
        </div>
    </div>
</section>
</body>
</html>
