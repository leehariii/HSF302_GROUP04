<!DOCTYPE html>
<html th:replace="~{layout/main :: layout(${post.title}, ~{::section})}"
      lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head><title>Bài viết</title></head>
<body>
<section>
    <div class="post-detail-layout">

        <!-- POST CONTENT -->
        <article class="post-detail-card">
            <div class="post-detail-meta">
                <a th:href="@{/topics/{id}(id=${post.topic.id})}"
                   class="post-topic-badge" th:text="${post.topic.name}"></a>
                <span th:if="${post.isPinned}" class="badge badge-pinned">
                    <i class="fa-solid fa-thumbtack"></i> Đã ghim
                </span>
                <span class="meta-sep">•</span>
                <span class="meta-author">
                    <i class="fa-solid fa-circle-user"></i>
                    <strong th:text="${post.author.username}"></strong>
                </span>
                <span class="meta-sep">•</span>
                <span th:text="${#temporals.format(post.createdAt, 'dd/MM/yyyy HH:mm')}"></span>
                <span class="meta-sep">•</span>
                <span><i class="fa-solid fa-eye"></i> <span th:text="${post.viewCount}"></span></span>
            </div>

            <!-- BANNER CANH BAO BAI VIET AN/XOA -->
            <div th:if="${post.status.name() != 'ACTIVE'}" class="alert alert-warning" style="margin-top: 16px; margin-bottom: 16px;">
                <i class="fa-solid fa-triangle-exclamation"></i>
                <strong>Bài viết này đang bị ẩn hoặc xóa.</strong>
                <span th:if="${post.moderationReason != null and !post.moderationReason.isEmpty()}">
                    Lý do: <span th:text="${post.moderationReason}"></span>
                </span>
            </div>

            <h1 class="post-detail-title" th:text="${post.title}"></h1>
            
            <div th:if="${post.imageUrl != null and !post.imageUrl.isEmpty()}" style="margin-bottom: 24px; text-align: center;">
                <img th:src="${post.imageUrl}" alt="Post image" style="max-width: 100%; max-height: 500px; border-radius: 8px; object-fit: cover;"/>
            </div>
            
            <div class="post-detail-content" th:text="${post.content}"></div>

            <!-- ACTION BAR -->
            <div class="post-actions" sec:authorize="isAuthenticated()">
                <!-- Like -->
                <form th:action="@{/likes/post/{id}(id=${post.id})}" method="post" class="d-inline">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-action"
                            th:classappend="${isLiked} ? ' btn-liked'">
                        <i class="fa-solid fa-heart"></i>
                        <span th:text="${likeCount}">0</span>
                        <span th:text="${isLiked} ? 'Bỏ thích' : 'Thích'"></span>
                    </button>
                </form>

                <!-- Bookmark -->
                <form th:action="@{/bookmarks/post/{id}(id=${post.id})}" method="post" class="d-inline">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-action"
                            th:classappend="${isSaved} ? ' btn-saved'">
                        <i class="fa-solid fa-bookmark"></i>
                        <span th:text="${isSaved} ? 'Đã lưu' : 'Lưu bài'"></span>
                    </button>
                </form>

                <!-- Report -->
                <button class="btn btn-action btn-report"
                        onclick="toggleReportForm('post-report')">
                    <i class="fa-solid fa-flag"></i> Báo cáo
                </button>

                <!-- Owner: Edit / Delete -->
                <div th:if="${currentUser != null and currentUser.id == post.author.id}"
                     class="post-owner-actions">
                    <a th:href="@{/posts/{id}/edit(id=${post.id})}" class="btn btn-outline btn-sm">
                        <i class="fa-solid fa-pencil"></i> Sửa
                    </a>
                    <form th:action="@{/posts/{id}/delete(id=${post.id})}" method="post"
                          class="d-inline"
                          onsubmit="return confirm('Xác nhận xóa bài viết?')">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-danger btn-sm">
                            <i class="fa-solid fa-trash"></i> Xóa
                        </button>
                    </form>
                </div>

                <!-- Moderator -->
                <div sec:authorize="hasRole('MODERATOR')" class="mod-actions">
                    <form th:unless="${post.isPinned}"
                          th:action="@{/moderator/posts/{id}/pin(id=${post.id})}" method="post" class="d-inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-outline btn-sm">
                            <i class="fa-solid fa-thumbtack"></i> Pin
                        </button>
                    </form>
                    <form th:if="${post.isPinned}"
                          th:action="@{/moderator/posts/{id}/unpin(id=${post.id})}" method="post" class="d-inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-outline btn-sm">
                            <i class="fa-solid fa-thumbtack"></i> Bỏ ghim
                        </button>
                    </form>
                    <form th:action="@{/moderator/posts/{id}/hide(id=${post.id})}" method="post" class="d-inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-warning btn-sm">
                            <i class="fa-solid fa-eye-slash"></i> Ẩn
                        </button>
                    </form>
                    <form th:action="@{/moderator/posts/{id}/delete(id=${post.id})}" method="post"
                          class="d-inline"
                          onsubmit="return confirm('Xóa bài vi phạm?')">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-danger btn-sm">
                            <i class="fa-solid fa-trash"></i> Xóa (Mod)
                        </button>
                    </form>
                </div>
            </div>

            <!-- Report form (hidden) -->
            <div id="post-report" class="report-form hidden" sec:authorize="isAuthenticated()">
                <h4><i class="fa-solid fa-flag"></i> Báo cáo bài viết</h4>
                <form th:action="@{/reports/post/{id}(id=${post.id})}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <div class="form-group">
                        <textarea name="reason" class="form-control" rows="3"
                                  placeholder="Lý do báo cáo..." required maxlength="500"></textarea>
                    </div>
                    <button type="submit" class="btn btn-danger btn-sm">Gửi báo cáo</button>
                    <button type="button" class="btn btn-ghost btn-sm"
                            onclick="toggleReportForm('post-report')">Hủy</button>
                </form>
            </div>
        </article>

        <!-- COMMENTS -->
        <section class="comments-section">
            <h3 class="comments-title">
                <i class="fa-solid fa-comments"></i>
                Bình luận (<span th:text="${commentCount}">0</span>)
            </h3>

            <!-- Form comment moi -->
            <div sec:authorize="isAuthenticated()" class="comment-form-card">
                <form th:action="@{/comments/post/{id}(id=${post.id})}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <input type="hidden" name="parentCommentId" value=""/>
                    <div class="form-group">
                        <textarea name="content" class="form-control" rows="3"
                                  placeholder="Viết bình luận của bạn..." required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary btn-sm">
                        <i class="fa-solid fa-paper-plane"></i> Bình luận
                    </button>
                </form>
            </div>

            <div sec:authorize="isAnonymous()" class="comment-login-prompt">
                <a th:href="@{/auth/login}">Đăng nhập</a> để tham gia bình luận.
            </div>

            <!-- Danh sach comment -->
            <div class="comment-list">
                <div th:each="comment : ${rootComments}" class="comment-card">
                    <div class="comment-header">
                        <i class="fa-solid fa-circle-user comment-avatar"></i>
                        <span class="comment-author" th:text="${comment.author.username}"></span>
                        <span class="comment-date"
                              th:text="${#temporals.format(comment.createdAt, 'dd/MM/yyyy HH:mm')}"></span>

                        <!-- Mod: xoa comment -->
                        <form sec:authorize="hasRole('MODERATOR')"
                              th:action="@{/moderator/comments/{id}/delete(id=${comment.id})}"
                              method="post" class="d-inline">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <input type="hidden" name="postId" th:value="${post.id}"/>
                            <button type="submit" class="btn btn-danger btn-xs">Xóa</button>
                        </form>

                        <!-- Report comment -->
                        <button sec:authorize="isAuthenticated()"
                                class="btn btn-ghost btn-xs"
                                th:onclick="'toggleReportForm(\'report-comment-' + ${comment.id} + '\')'">
                            <i class="fa-solid fa-flag"></i>
                        </button>
                    </div>

                    <p class="comment-content" th:text="${comment.content}"></p>

                    <!-- Actions -->
                    <div class="comment-actions" sec:authorize="isAuthenticated()">
                        <form th:action="@{/likes/comment/{id}(id=${comment.id})}" method="post" class="d-inline">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <input type="hidden" name="postId" th:value="${post.id}"/>
                            <button type="submit" class="btn btn-action btn-xs">
                                <i class="fa-solid fa-heart"></i>
                            </button>
                        </form>
                        <button class="btn btn-ghost btn-xs"
                                th:onclick="'toggleReply(' + ${comment.id} + ')'">
                            <i class="fa-solid fa-reply"></i> Reply
                        </button>
                    </div>

                    <!-- Reply form -->
                    <div th:id="'reply-form-' + ${comment.id}"
                         class="reply-form hidden"
                         sec:authorize="isAuthenticated()">
                        <form th:action="@{/comments/post/{id}(id=${post.id})}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <input type="hidden" name="parentCommentId" th:value="${comment.id}"/>
                            <div class="form-group">
                                <textarea name="content" class="form-control" rows="2"
                                          th:placeholder="'Trả lời @' + ${comment.author.username} + '...'"
                                          required></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary btn-xs">Gửi</button>
                            <button type="button" class="btn btn-ghost btn-xs"
                                    th:onclick="'toggleReply(' + ${comment.id} + ')'">Hủy</button>
                        </form>
                    </div>

                    <!-- Report comment form -->
                    <div th:id="'report-comment-' + ${comment.id}"
                         class="report-form hidden"
                         sec:authorize="isAuthenticated()">
                        <form th:action="@{/reports/comment/{id}(id=${comment.id})}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <input type="hidden" name="postId" th:value="${post.id}"/>
                            <textarea name="reason" class="form-control" rows="2"
                                      placeholder="Lý do báo cáo..." required></textarea>
                            <button type="submit" class="btn btn-danger btn-xs mt-8">Báo cáo</button>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </div>
</section>
</body>
</html>
