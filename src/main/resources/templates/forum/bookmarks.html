<!DOCTYPE html>
<html th:replace="~{layout/main :: layout('Bài đã lưu', ~{::section})}"
      lang="vi"
      xmlns:th="http://www.thymeleaf.org">
<head><title>Bookmark</title></head>
<body>
<section>
    <div class="page-header">
        <h2 class="page-title">
            <i class="fa-solid fa-bookmark"></i> Bài viết đã lưu
        </h2>
    </div>

    <div class="post-list" th:if="${savedPosts != null and !savedPosts.isEmpty()}">
        <div th:each="saved : ${savedPosts}" class="post-card">
            <div class="post-card-body">
                <div class="post-meta">
                    <span class="post-topic-badge" th:text="${saved.post.topic.name}"></span>
                    <span style="font-size:0.75rem;color:var(--color-text-muted);">
                        Lưu lúc: <span th:text="${#temporals.format(saved.createdAt, 'dd/MM/yyyy')}"></span>
                    </span>
                </div>

                <h3 class="post-title">
                    <a th:href="@{/posts/{id}(id=${saved.post.id})}"
                       th:text="${saved.post.title}"></a>
                </h3>

                <p class="post-excerpt"
                   th:text="${#strings.abbreviate(saved.post.content, 150)}"></p>

                <div class="post-footer">
                    <span class="post-author">
                        <i class="fa-solid fa-circle-user"></i>
                        <span th:text="${saved.post.author.username}"></span>
                    </span>
                    <button type="button"
                            class="btn btn-outline btn-sm js-unsave-bookmark"
                            th:data-post-id="${saved.post.id}">
                        <i class="fa-solid fa-bookmark-slash"></i> Bỏ lưu
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${savedPosts == null or savedPosts.isEmpty()}" class="empty-state">
        <i class="fa-solid fa-bookmark"></i>
        <p>Bạn chưa lưu bài viết nào.</p>
        <a th:href="@{/}" class="btn btn-primary">Khám phá bài viết</a>
    </div>

    <!-- Pagination — dong bo voi home.html / topic-detail.html -->
    <div th:if="${savedPosts != null and savedPosts.totalPages > 1}" class="pagination">
        <a th:if="${!savedPosts.first}"
           th:href="@{/member/saved-posts(page=${savedPosts.number - 1}, size=10)}"
           class="btn btn-outline btn-sm">
            <i class="fa-solid fa-chevron-left"></i> Trước
        </a>
        <span th:if="${savedPosts.first}"
              class="btn btn-outline btn-sm disabled"
              style="pointer-events:none; opacity:0.5;">
            <i class="fa-solid fa-chevron-left"></i> Trước
        </span>

        <span class="page-info"
              th:text="'Trang ' + (${savedPosts.number} + 1) + ' / ' + ${savedPosts.totalPages}">
        </span>

        <a th:if="${!savedPosts.last}"
           th:href="@{/member/saved-posts(page=${savedPosts.number + 1}, size=10)}"
           class="btn btn-outline btn-sm">
            Sau <i class="fa-solid fa-chevron-right"></i>
        </a>
        <span th:if="${savedPosts.last}"
              class="btn btn-outline btn-sm disabled"
              style="pointer-events:none; opacity:0.5;">
            Sau <i class="fa-solid fa-chevron-right"></i>
        </span>
    </div>
</section>
</body>
</html>
