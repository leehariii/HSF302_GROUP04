<!DOCTYPE html>
<html th:replace="~{layout/main :: layout('Đăng nhập', ~{::section})}"
      lang="vi"
      xmlns:th="http://www.thymeleaf.org">
<head><title>Đăng nhập</title></head>
<body>
<section>
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-logo">
                <i class="fa-solid fa-comments"></i>
                <h1 class="auth-title">FPTU Forum</h1>
                <p class="auth-subtitle">Đăng nhập để tham gia cộng đồng</p>
            </div>

            <div th:if="${errorMsg}" class="alert alert-error">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span th:text="${errorMsg}"></span>
            </div>
            <div th:if="${successMsg}" class="alert alert-success">
                <i class="fa-solid fa-circle-check"></i>
                <span th:text="${successMsg}"></span>
            </div>

            <form th:action="@{/auth/login}" method="post" class="auth-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div class="form-group">
                    <label for="username" class="form-label">
                        <i class="fa-solid fa-user"></i> Username
                    </label>
                    <input type="text" id="username" name="username"
                           class="form-control" placeholder="Nhập username..."
                           required autocomplete="username"/>
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">
                        <i class="fa-solid fa-lock"></i> Mật khẩu
                    </label>
                    <div class="input-group">
                        <input type="password" id="password" name="password"
                               class="form-control" placeholder="Nhập mật khẩu..."
                               required autocomplete="current-password"/>
                        <button type="button" class="input-addon" onclick="togglePassword('password')">
                            <i class="fa-solid fa-eye" id="password-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-full">
                    <i class="fa-solid fa-right-to-bracket"></i> Đăng nhập
                </button>
            </form>

            <div class="auth-footer">
                <p>Chưa có tài khoản?
                    <a th:href="@{/auth/register}" class="link-primary">Đăng ký ngay</a>
                </p>
            </div>
        </div>
    </div>
</section>
</body>
</html>
