<!DOCTYPE html>
<html th:replace="~{layout/main :: layout('Đổi mật khẩu', ~{::section})}"
      lang="vi"
      xmlns:th="http://www.thymeleaf.org">
<head><title>Đổi mật khẩu</title></head>
<body>
<section>
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-logo">
                <i class="fa-solid fa-lock"></i>
                <h1 class="auth-title">Đổi mật khẩu</h1>
            </div>

            <form th:action="@{/change-password}" method="post"
                  th:object="${changePasswordRequest}" class="auth-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-error">
                    <span th:each="err : ${#fields.globalErrors()}" th:text="${err}"></span>
                </div>

                <div class="form-group">
                    <label class="form-label">Mật khẩu hiện tại *</label>
                    <input type="password" th:field="*{currentPassword}"
                           class="form-control"
                           th:classappend="${#fields.hasErrors('currentPassword')} ? ' is-invalid'"/>
                    <span th:if="${#fields.hasErrors('currentPassword')}"
                          th:errors="*{currentPassword}" class="form-error"></span>
                </div>

                <div class="form-group">
                    <label class="form-label">Mật khẩu mới *</label>
                    <input type="password" th:field="*{newPassword}"
                           class="form-control"
                           th:classappend="${#fields.hasErrors('newPassword')} ? ' is-invalid'"
                           placeholder="Tối thiểu 6 ký tự..."/>
                    <span th:if="${#fields.hasErrors('newPassword')}"
                          th:errors="*{newPassword}" class="form-error"></span>
                </div>

                <div class="form-group">
                    <label class="form-label">Xác nhận mật khẩu mới *</label>
                    <input type="password" th:field="*{confirmPassword}"
                           class="form-control"
                           th:classappend="${#fields.hasErrors('confirmPassword')} ? ' is-invalid'"/>
                    <span th:if="${#fields.hasErrors('confirmPassword')}"
                          th:errors="*{confirmPassword}" class="form-error"></span>
                </div>

                <div class="form-actions">
                    <a th:href="@{/profile}" class="btn btn-ghost">Hủy</a>
                    <button type="submit" class="btn btn-primary">
                        <i class="fa-solid fa-floppy-disk"></i> Lưu thay đổi
                    </button>
                </div>
            </form>
        </div>
    </div>
</section>
</body>
</html>
