<!DOCTYPE html>
<html th:replace="~{layout/main :: layout('Chi tiết User', ~{::section})}"
      lang="vi"
      xmlns:th="http://www.thymeleaf.org">
<head><title>Chi tiết User</title></head>
<body>
<section>
    <div class="page-header">
        <a th:href="@{/admin/users}" class="btn btn-ghost btn-sm">
            <i class="fa-solid fa-arrow-left"></i> Quay lại
        </a>
        <h2 class="page-title">Chi tiết: <span th:text="${targetUser.username}"></span></h2>
    </div>

    <div class="detail-grid">
        <!-- Thong tin user -->
        <div class="detail-card">
            <h3 class="card-title">Thông tin tài khoản</h3>

            <!-- Avatar -->
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;">
                <img th:if="${targetUser.avatarUrl != null and !#strings.isEmpty(targetUser.avatarUrl)}"
                     th:src="${targetUser.avatarUrl}"
                     alt="Avatar" style="width:64px;height:64px;border-radius:50%;object-fit:cover;border:2px solid var(--color-border);"/>
                <i th:unless="${targetUser.avatarUrl != null and !#strings.isEmpty(targetUser.avatarUrl)}"
                   class="fa-solid fa-circle-user" style="font-size:3.5rem;color:var(--color-muted);"></i>
            </div>

            <div class="detail-row"><span class="detail-label">ID:</span> <span th:text="${targetUser.id}"></span></div>
            <div class="detail-row"><span class="detail-label">Username:</span> <span th:text="${targetUser.username}"></span></div>
            <div class="detail-row"><span class="detail-label">Email:</span> <span th:text="${targetUser.email}"></span></div>
            <div class="detail-row"><span class="detail-label">Họ tên:</span> <span th:text="${targetUser.fullName != null ? targetUser.fullName : '—'}"></span></div>
            <div class="detail-row">
                <span class="detail-label">Role:</span>
                <span class="badge"
                      th:classappend="${targetUser.role.name() == 'ADMIN'} ? 'badge-admin' : (${targetUser.role.name() == 'MODERATOR'} ? 'badge-moderator' : 'badge-member')"
                      th:text="${targetUser.role}"></span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Trạng thái:</span>
                <span class="badge"
                      th:classappend="${targetUser.status.name() == 'BANNED'} ? 'badge-danger' : 'badge-success'"
                      th:text="${targetUser.status}"></span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Tham gia:</span>
                <span th:text="${#temporals.format(targetUser.createdAt, 'dd/MM/yyyy HH:mm')}"></span>
            </div>

            <!-- Thong tin ban (chi hien khi BANNED) -->
            <div th:if="${targetUser.status.name() == 'BANNED'}" class="ban-info-box" style="margin-top:16px;padding:12px;background:var(--color-danger-bg, #fef2f2);border:1px solid #fca5a5;border-radius:8px;">
                <h4 style="color:#dc2626;margin-bottom:8px;"><i class="fa-solid fa-ban"></i> Thông tin khóa</h4>
                <div class="detail-row">
                    <span class="detail-label">Lý do:</span>
                    <span th:text="${targetUser.bannedReason != null ? targetUser.bannedReason : '—'}"></span>
                </div>
                <div class="detail-row" th:if="${targetUser.bannedBy != null}">
                    <span class="detail-label">Khóa bởi:</span>
                    <span th:text="${targetUser.bannedBy.username}"></span>
                </div>
                <div class="detail-row" th:if="${targetUser.bannedAt != null}">
                    <span class="detail-label">Khóa lúc:</span>
                    <span th:text="${#temporals.format(targetUser.bannedAt, 'dd/MM/yyyy HH:mm')}"></span>
                </div>
            </div>
        </div>

        <!-- Admin actions -->
        <div class="detail-card">
            <h3 class="card-title">Hành động quản trị</h3>

            <!-- Khong hien thi action voi ADMIN -->
            <div th:if="${targetUser.role.name() == 'ADMIN'}"
                 style="color:var(--color-muted);font-style:italic;">
                <i class="fa-solid fa-lock"></i> Không thể thực hiện hành động với tài khoản Admin.
            </div>

            <!-- Actions chi danh cho non-ADMIN -->
            <div th:unless="${targetUser.role.name() == 'ADMIN'}">

                <!-- Ban: chi khi ACTIVE -->
                <div class="action-row" th:if="${targetUser.status.name() == 'ACTIVE'}">
                    <form th:action="@{/admin/users/{id}/ban(id=${targetUser.id})}"
                          method="post" th:object="${banForm}" id="ban-form">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                        <div class="form-group">
                            <label class="form-label" for="ban-reason">
                                <i class="fa-solid fa-ban"></i> Lý do khóa tài khoản *
                            </label>
                            <textarea id="ban-reason" th:field="*{reason}"
                                      class="form-control"
                                      th:classappend="${#fields.hasErrors('reason')} ? ' is-invalid'"
                                      rows="3" maxlength="255"
                                      placeholder="Nhập lý do khóa..."></textarea>
                            <span th:if="${#fields.hasErrors('reason')}"
                                  th:errors="*{reason}" class="form-error"></span>
                        </div>

                        <button type="submit" class="btn btn-danger"
                                onclick="return confirm('Xác nhận khóa tài khoản này?')">
                            <i class="fa-solid fa-ban"></i> Khóa tài khoản
                        </button>
                    </form>
                </div>

                <!-- Unban: chi khi BANNED -->
                <div class="action-row" th:if="${targetUser.status.name() == 'BANNED'}">
                    <form th:action="@{/admin/users/{id}/unban(id=${targetUser.id})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-success">
                            <i class="fa-solid fa-circle-check"></i> Mở khóa tài khoản
                        </button>
                    </form>
                </div>

                <!-- Promote: chi khi MEMBER + ACTIVE -->
                <div class="action-row"
                     th:if="${targetUser.role.name() == 'MEMBER' and targetUser.status.name() == 'ACTIVE'}">
                    <form th:action="@{/admin/users/{id}/promote(id=${targetUser.id})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-primary"
                                onclick="return confirm('Promote người dùng này lên MODERATOR?')">
                            <i class="fa-solid fa-arrow-up"></i> Promote → MODERATOR
                        </button>
                    </form>
                </div>

                <!-- Demote: chi khi MODERATOR -->
                <div class="action-row" th:if="${targetUser.role.name() == 'MODERATOR'}">
                    <form th:action="@{/admin/users/{id}/demote(id=${targetUser.id})}" method="post"
                          onsubmit="return confirm('Demote Moderator này xuống MEMBER?')">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-warning">
                            <i class="fa-solid fa-arrow-down"></i> Demote → MEMBER
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Lich su restriction (Moderator data - read only) -->
    <div class="detail-card" th:if="${restrictions != null and !restrictions.isEmpty()}">
        <h3 class="card-title"><i class="fa-solid fa-list"></i> Lịch sử hạn chế</h3>
        <table class="data-table">
            <thead>
            <tr>
                <th>Loại</th><th>Lý do</th><th>Trạng thái</th>
                <th>Bắt đầu</th><th>Kết thúc</th><th>Moderator</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="r : ${restrictions}">
                <td><span class="badge badge-warning" th:text="${r.restrictionType}"></span></td>
                <td th:text="${r.reason}"></td>
                <td>
                    <span th:classappend="${r.isActive} ? 'badge badge-danger' : 'badge badge-secondary'"
                          th:text="${r.isActive ? 'Đang hiệu lực' : 'Đã hết'}"></span>
                </td>
                <td th:text="${#temporals.format(r.startAt, 'dd/MM/yyyy HH:mm')}"></td>
                <td th:text="${r.endAt != null ? #temporals.format(r.endAt, 'dd/MM/yyyy HH:mm') : 'Vĩnh viễn'}"></td>
                <td th:text="${r.createdBy.username}"></td>
            </tr>
            </tbody>
        </table>
    </div>
</section>
</body>
</html>
