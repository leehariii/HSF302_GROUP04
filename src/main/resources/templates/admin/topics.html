<!DOCTYPE html>
<html th:replace="~{layout/main :: layout('Quản lý Topics', ~{::section})}"
      lang="vi"
      xmlns:th="http://www.thymeleaf.org">
<head><title>Quản lý Topics</title></head>
<body>
<section>
    <div class="page-header">
        <h2 class="page-title"><i class="fa-solid fa-list"></i> Quản lý chủ đề</h2>
        <a th:href="@{/admin/topics/create}" class="btn btn-primary">
            <i class="fa-solid fa-plus"></i> Tạo chủ đề
        </a>
    </div>

    <div class="table-card">
        <table class="data-table">
            <thead>
                <tr>
                    <th>ID</th><th>Tên chủ đề</th><th>Mô tả</th><th>Ngày tạo</th><th>Hành động</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="topic : ${topics}">
                    <td th:text="${topic.id}"></td>
                    <td>
                        <a th:href="@{/topics/{id}(id=${topic.id})}"
                           th:text="${topic.name}"></a>
                    </td>
                    <td th:text="${#strings.abbreviate(topic.description, 80)}"></td>
                    <td th:text="${#temporals.format(topic.createdAt, 'dd/MM/yyyy')}"></td>
                    <td>
                        <a th:href="@{/admin/topics/edit/{id}(id=${topic.id})}"
                           class="btn btn-outline btn-sm">
                            <i class="fa-solid fa-pencil"></i> Sửa
                        </a>
                        <form th:action="@{/admin/topics/delete/{id}(id=${topic.id})}"
                              method="post" class="d-inline"
                              onsubmit="return confirm('Xóa chủ đề này?')">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="btn btn-danger btn-sm">
                                <i class="fa-solid fa-trash"></i> Xóa
                            </button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</section>
</body>
</html>
