<!DOCTYPE html>
<html th:replace="~{layout/main :: layout('Quản lý Topics', ~{::section})}"
      lang="vi"
      xmlns:th="http://www.thymeleaf.org">
<head><title>Quản lý Topics</title></head>
<body>
<section>
    <div class="page-header">
        <h2 class="page-title"><i class="fa-solid fa-list"></i> Quản lý chủ đề</h2>
        <a th:href="@{/admin/topics/create}" class="btn btn-primary">
            <i class="fa-solid fa-plus"></i> Tạo chủ đề
        </a>
    </div>

    <!-- Search + Sort -->
    <form th:action="@{/admin/topics}" method="get" class="search-bar" id="topic-filter-form">
        <input type="text" name="keyword" th:value="${keyword}"
               class="form-control" placeholder="Tìm tên chủ đề..." style="flex:1;"/>
        <input type="hidden" name="sort" th:value="${sort}"/>
        <input type="hidden" name="dir"  th:value="${dir}"/>
        <button type="submit" class="btn btn-primary btn-sm">
            <i class="fa-solid fa-search"></i> Tìm
        </button>
        <a th:href="@{/admin/topics}" class="btn btn-ghost btn-sm">Xóa lọc</a>
    </form>

    <div class="table-card">
        <table class="data-table">
            <thead>
            <tr>
                <th>ID</th>
                <th>
                    <a th:href="@{/admin/topics(keyword=${keyword},sort='name',dir=${sort == 'name' and dir == 'asc' ? 'desc' : 'asc'})}"
                       style="color:inherit;text-decoration:none;">
                        Tên chủ đề
                        <i th:if="${sort == 'name'}"
                           th:classappend="${dir == 'asc' ? 'fa-sort-up' : 'fa-sort-down'}"
                           class="fa-solid"></i>
                    </a>
                </th>
                <th>Mô tả</th>
                <th>
                    <a th:href="@{/admin/topics(keyword=${keyword},sort='createdAt',dir=${sort == 'createdAt' and dir == 'asc' ? 'desc' : 'asc'})}"
                       style="color:inherit;text-decoration:none;">
                        Ngày tạo
                        <i th:if="${sort == 'createdAt'}"
                           th:classappend="${dir == 'asc' ? 'fa-sort-up' : 'fa-sort-down'}"
                           class="fa-solid"></i>
                    </a>
                </th>
                <th>Hành động</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="topic : ${topics}">
                <td th:text="${topic.id}"></td>
                <td>
                    <a th:href="@{/topics/{id}(id=${topic.id})}"
                       th:text="${topic.name}"></a>
                </td>
                <td th:text="${topic.description != null ? #strings.abbreviate(topic.description, 80) : '—'}"></td>
                <td th:text="${#temporals.format(topic.createdAt, 'dd/MM/yyyy')}"></td>
                <td style="white-space:nowrap;">
                    <a th:href="@{/admin/topics/edit/{id}(id=${topic.id})}"
                       class="btn btn-outline btn-sm">
                        <i class="fa-solid fa-pencil"></i> Sửa
                    </a>
                    <form th:action="@{/admin/topics/delete/{id}(id=${topic.id})}"
                          method="post" class="d-inline"
                          onsubmit="return confirm('Xóa chủ đề này? Hành động không thể hoàn tác.')">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-danger btn-sm">
                            <i class="fa-solid fa-trash"></i> Xóa
                        </button>
                    </form>
                </td>
            </tr>
            <tr th:if="${topics.isEmpty()}">
                <td colspan="5" style="text-align:center;color:var(--color-muted);padding:32px;">
                    Không tìm thấy chủ đề nào.
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- Phân trang -->
    <div th:if="${topics.totalPages > 1}" class="pagination">
        <a th:if="${!topics.first}"
           th:href="@{/admin/topics(keyword=${keyword},sort=${sort},dir=${dir},page=${topics.number - 1})}"
           class="btn btn-outline btn-sm">Trước</a>
        <span class="page-info"
              th:text="'Trang ' + (${topics.number} + 1) + '/' + ${topics.totalPages} + ' (' + ${topics.totalElements} + ' chủ đề)'"></span>
        <a th:if="${!topics.last}"
           th:href="@{/admin/topics(keyword=${keyword},sort=${sort},dir=${dir},page=${topics.number + 1})}"
           class="btn btn-outline btn-sm">Tiếp</a>
    </div>
</section>
</body>
</html>
