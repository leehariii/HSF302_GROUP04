<!DOCTYPE html>
<html th:replace="~{layout/main :: layout(${isEdit ? 'Sửa chủ đề' : 'Tạo chủ đề'}, ~{::section})}"
      lang="vi"
      xmlns:th="http://www.thymeleaf.org">
<head><title>Topic Form</title></head>
<body>
<section>
    <div class="form-page">
        <div class="form-card">
            <h2 class="form-title">
                <i class="fa-solid fa-list"></i>
                <span th:text="${isEdit ? 'Chỉnh sửa chủ đề' : 'Tạo chủ đề mới'}"></span>
            </h2>

            <form th:action="${isEdit ? '/admin/topics/edit/' + topicId : '/admin/topics/create'}"
                  method="post" th:object="${topicRequest}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div class="form-group">
                    <label class="form-label">Tên chủ đề *</label>
                    <input type="text" th:field="*{name}" class="form-control"
                           th:classappend="${#fields.hasErrors('name')} ? ' is-invalid'"
                           placeholder="Nhập tên chủ đề..." maxlength="100"/>
                    <span th:if="${#fields.hasErrors('name')}"
                          th:errors="*{name}" class="form-error"></span>
                </div>

                <div class="form-group">
                    <label class="form-label">Mô tả</label>
                    <textarea th:field="*{description}" class="form-control" rows="4"
                              placeholder="Mô tả chủ đề..." maxlength="255"></textarea>
                </div>

                <div class="form-actions">
                    <a th:href="@{/admin/topics}" class="btn btn-ghost">Hủy</a>
                    <button type="submit" class="btn btn-primary">
                        <i class="fa-solid fa-floppy-disk"></i>
                        <span th:text="${isEdit ? 'Cập nhật' : 'Tạo chủ đề'}"></span>
                    </button>
                </div>
            </form>
        </div>
    </div>
</section>
</body>
</html>
