<!DOCTYPE html>
<html th:fragment="layout(pageTitle, content)"
      lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${pageTitle} + ' — FPTU Forum'">FPTU Forum</title>
    <!-- CSRF meta tags cho AJAX fetch (doc boi getCsrfToken() trong main.js) -->
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="page-wrapper">

<!-- ===== NAVBAR ===== -->
<nav class="navbar">
    <div class="container nav-inner">
        <a th:href="@{/}" class="nav-brand">
            <i class="fa-solid fa-comments"></i> FPTU Forum
        </a>

        <div class="nav-links">
            <a th:href="@{/}" class="nav-link">Trang chủ</a>
            <a th:href="@{/topics}" class="nav-link">Chủ đề</a>
            <form th:action="@{/search}" method="get" class="nav-search">
                <input type="hidden" name="topicId" th:if="${selectedTopicId != null}" th:value="${selectedTopicId}" />
                <input type="text" name="keyword" th:value="${keyword}" placeholder="Tìm kiếm..." class="search-input"/>
                <button type="submit" class="btn btn-sm btn-outline">
                    <i class="fa-solid fa-search"></i>
                </button>
            </form>
        </div>

        <div class="nav-actions">
            <!-- Chua dang nhap -->
            <div sec:authorize="isAnonymous()" style="display:flex;gap:8px;">
                <a th:href="@{/auth/login}" class="btn btn-outline btn-sm">Đăng nhập</a>
                <a th:href="@{/auth/register}" class="btn btn-primary btn-sm">Đăng ký</a>
            </div>

            <!-- Da dang nhap -->
            <div sec:authorize="isAuthenticated()" class="nav-user-menu">
                <a sec:authorize="hasRole('MODERATOR')"
                   th:href="@{/moderator/reports}" class="nav-link nav-link-mod">
                    <i class="fa-solid fa-shield-halved"></i> Moderation
                </a>
                <a sec:authorize="hasRole('ADMIN')"
                   th:href="@{/admin/dashboard}" class="nav-link nav-link-admin">
                    <i class="fa-solid fa-gear"></i> Admin
                </a>

                <div class="dropdown">
                    <button class="btn btn-ghost dropdown-toggle">
                        <i class="fa-solid fa-circle-user"></i>
                        <span sec:authentication="name">Username</span>
                        <i class="fa-solid fa-chevron-down"></i>
                    </button>
                    <div class="dropdown-menu">
                        <a th:href="@{/profile}" class="dropdown-item">
                            <i class="fa-solid fa-user"></i> Profile
                        </a>
                        <a th:href="@{/posts/new}" class="dropdown-item">
                            <i class="fa-solid fa-pen-to-square"></i> Đăng bài
                        </a>
                        <a th:href="@{/member/saved-posts}" class="dropdown-item">
                            <i class="fa-solid fa-bookmark"></i> Bookmark
                        </a>
                        <a th:href="@{/change-password}" class="dropdown-item">
                            <i class="fa-solid fa-lock"></i> Đổi mật khẩu
                        </a>
                        <div class="dropdown-divider"></div>
                        <form th:action="@{/logout}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="dropdown-item text-danger">
                                <i class="fa-solid fa-right-from-bracket"></i> Đăng xuất
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</nav>

<!-- ===== FLASH MESSAGES ===== -->
<div class="container" style="margin-top:12px;">
    <div th:if="${successMsg}" class="alert alert-success">
        <i class="fa-solid fa-circle-check"></i>
        <span th:text="${successMsg}"></span>
    </div>
    <div th:if="${errorMsg}" class="alert alert-error">
        <i class="fa-solid fa-circle-exclamation"></i>
        <span th:text="${errorMsg}"></span>
    </div>
</div>

<!-- ===== MAIN CONTENT ===== -->
<main class="main-content container">
    <div th:replace="${content}"><!-- Page content goes here --></div>
</main>

<!-- ===== FOOTER ===== -->
<footer class="footer">
    <div class="container">
        <p>&copy; 2025 FPTU Forum — Cộng đồng sinh viên FPT University</p>
    </div>
</footer>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
