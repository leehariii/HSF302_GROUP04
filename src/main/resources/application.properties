# ==========================================
# FPTU Forum - Application Configuration
# ==========================================

spring.application.name=FPTU Forum

# ------------------------------------------
# DataSource - SQL Server
# ------------------------------------------
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=FptuForumDB;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=123
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ------------------------------------------
# JPA / Hibernate
# ddl-auto=validate: chi validate schema, khong tao/sua bang
# ------------------------------------------
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# ------------------------------------------
# Thymeleaf
# ------------------------------------------
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# ------------------------------------------
# Server
# ------------------------------------------
server.port=8080

# ------------------------------------------
# Spring Security - redirect sau login
# ------------------------------------------
spring.security.user.name=admin
spring.security.user.password=admin
